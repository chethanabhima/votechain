<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Vote Chain{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
  {% block head %}{% endblock %}
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow glow-1"></div>
  <div class="bg-glow glow-2"></div>

  {% if session.get('admin') or session.get('voter_id') %}
  <nav class="navbar">
    <a href="{{ url_for('index') }}" class="nav-brand">VOTE<span>CHAIN</span></a>
    <div class="nav-links">
      {% if session.get('admin') %}
        <a href="{{ url_for('admin_dashboard') }}">Dashboard</a>
        <a href="{{ url_for('explorer') }}">Explorer</a>
        <a href="{{ url_for('audit') }}">Audit</a>
        <a href="{{ url_for('admin_logout') }}" class="btn-nav-logout">Logout</a>
      {% else %}
        <a href="{{ url_for('vote') }}">Vote</a>
        <a href="{{ url_for('voter_logout') }}" class="btn-nav-logout">Logout</a>
      {% endif %}
    </div>
  </nav>
  {% endif %}

  <main class="{% block main_class %}container{% endblock %}">
    {% block content %}{% endblock %}
  </main>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
